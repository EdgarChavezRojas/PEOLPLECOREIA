server:
  port: ${AI_SERVICE_PORT:8091}

spring:
  datasource:
    # ✅ Default alineado a tu docker actual: 127.0.0.1:5434 -> container 5432
    # Mantiene override enterprise por env vars (AI_DB_URL o AI_DB_HOST/PORT/NAME).
    url: ${AI_DB_URL:jdbc:postgresql://${AI_DB_HOST:127.0.0.1}:${AI_DB_PORT:5434}/${AI_DB_NAME:ai_service}}
    username: ${AI_DB_USER:postgres}
    password: ${AI_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: ${AI_DB_CONN_TIMEOUT_MS:5000}
      validation-timeout: ${AI_DB_VALIDATION_TIMEOUT_MS:2000}
      initiFalization-fail-timeout: ${AI_DB_INIT_FAIL_TIMEOUT_MS:0}
      maximum-pool-size: ${AI_DB_POOL_MAX:5}

  ai:
    ollama:
        base-url: http://localhost:11434
        chat:
          model: llama3            # <-- Movido afuera de options
          options:
            temperature: 0.2
        embedding:
          model: nomic-embed-text  # <-- Movido afuera de options
    vectorstore:
      pgvector:
        database-name: ${SPRING_DATASOURCE_NAME:ai_service}
        table-name: vector_store
        index-type: HNSW
        initialize-schema: true
        dimensions: 768  # <-- Nomic genera 768 dimensiones

  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IAM_ISSUER_URI:http://localhost:8080/realms/solveria}



# CORS Configuration (DEV: permissive for local frontends)
cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://localhost:5173
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: "*"
  exposed-headers: X-Total-Count,X-Page-Number,X-Page-Size
  allow-credentials: true
  max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
ai:
  stub:
    enabled: false