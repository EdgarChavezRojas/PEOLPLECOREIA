# JWT Security Configuration (PROD: enabled)
security:
  jwt:
    enabled: true

# OAuth2 Resource Server JWT Configuration
# Configure via environment variables (no hardcoded values):
# IAM_JWT_ISSUER_URI=https://auth.example.com/realms/myrealm
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IAM_JWT_ISSUER_URI:}

# Actuator Configuration (PROD: limited exposure)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

# CORS Configuration (PROD: restricted origins)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://app.example.com}
  allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  allowed-headers: Authorization,Content-Type,X-Tenant-Id,X-Correlation-Id
  exposed-headers: X-Total-Count,X-Page-Number,X-Page-Size
  allow-credentials: true
  max-age: 3600

# Logging Configuration (PROD: production levels)
logging:
  level:
    root: INFO
    com.solveria: INFO
    org.springframework.security: WARN

# ===================================================================
# REDIS CACHE & LETTUCE CONNECTION POOLING (PRODUCTION CONFIGURATION)
# ===================================================================
# To activate Redis Cache and Connection Pooling in production:
# 
# 1. Uncomment the following configuration block.
# 2. Make sure environment variables (SPRING_REDIS_HOST, SPRING_REDIS_PORT, SPRING_REDIS_PASSWORD)
#    are set in the deployment environment.
# 3. For secure setups (highly recommended in production), ensure ssl.enabled: true is active.
# 4. If utilising Sentinel or Cluster architectures, uncomment and configure those sections.
#
# spring:
#   cache:
#     type: redis
#   data:
#     redis:
#       host: ${SPRING_REDIS_HOST:redis-prod.internal}
#       port: ${SPRING_REDIS_PORT:6379}
#       password: ${SPRING_REDIS_PASSWORD}
#       timeout: 3000ms
#       ssl:
#         enabled: true # Enable TLS/SSL to encrypt cache traffic in transit
#       lettuce:
#         pool:
#           max-active: 32  # Scale connection pool size for production load
#           max-idle: 16
#           min-idle: 8
#           max-wait: 3000ms
#       # For Sentinel:
#       # sentinel:
#       #   master: mymaster
#       #   nodes: host1:26379,host2:26379
#       # For Cluster:
#       # cluster:
#       #   nodes: node1:6379,node2:6379
