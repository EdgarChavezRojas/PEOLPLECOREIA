# Database Configuration (DEV: PostgreSQL via Docker)
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/peoplecore_db
    username: iam_user
    password: iam_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: >
      classpath:db/migration/core,
      classpath:db/migration/timeAndBearing,
      classpath:db/migration/payroll,
      classpath:db/migration/scheduling
    baseline-on-migrate: true
    clean-disabled: false
    validate-on-migrate: false
    out-of-order: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# JWT Security Configuration (DEV mode: disabled by default)
security:
  jwt:
    enabled: false
    # RSA keys for token signing/validation (loaded from classpath in DEV)
    # Generate with: openssl genrsa -out private.pem 2048 && openssl rsa -in private.pem -pubout -out public.pem
    public-key-path: classpath:keys/public_key.pem
    private-key-path: classpath:keys/private_key.pem
    # Token validity duration (ISO-8601 duration). Default: 1h
    expiration: PT1H

# Google OAuth2 Configuration
google:
  client-id: 333331496654-8318b3209vkh780eguba1kouhlp8995t.apps.googleusercontent.com


# Actuator Configuration (DEV: expose more endpoints)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# Logging Configuration (DEV: more verbose)
logging:
  level:
    root: INFO
    com.solveria: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.flywaydb: DEBUG
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Experience (DEV)
experience:
  prediction:
    default-model-id: 00000000-0000-0000-0000-000000000000
legal:
  policies:
    smn:
      id: "REEMPLAZA_CON_UUID_REAL"
