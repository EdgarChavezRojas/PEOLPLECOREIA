# ============================================================================
# BC 6: Interaction & Intelligent Experience - Configuration
# PeopleCoreIA Platform
# ============================================================================

# --- Experience Module (BC 6) ---
spring.jpa.properties.hibernate.default_schema=public

# --- Certificate Generation (W14) ---
experience.certificate.qr-base-url=https://peoplecoreia.solveria.com/verify/
experience.certificate.hash-algorithm=SHA-256

# --- AI Predictive (Aggregate 11) ---
experience.ai.smn-vigente=3300.00
experience.ai.gestora-rate=0.1271
experience.ai.tacita-reconduccion-days-threshold=90
experience.ai.disciplinary-threshold-count=3
experience.ai.disciplinary-threshold-months=6

# --- Notification Channels ---
experience.notification.push-enabled=true
experience.notification.email-enabled=true

# --- Async Event Processing ---
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
